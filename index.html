<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris — Pink Edition</title>
  <meta name="description" content="핑크 테트리스 — 무료 브라우저 테트리스 게임">
  <!-- Google AdSense — publisher ID를 본인 것으로 교체하세요 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXXX"
          crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --pink:        #e91e63;
      --pink-lt:     #f48fb1;
      --pink-pale:   #fce4ec;
      --pink-dark:   #c2185b;

      --bg:          #f5f0f3;
      --card-bg:     #ffffff;
      --card-border: rgba(244,143,177,0.3);
      --card-shadow: rgba(233,30,99,0.06);
      --text:        #7b1c46;
      --text-label:  #f06292;
      --text-value:  #e91e63;
      --board-bg:    #fff0f5;
      --grid:        rgba(244,143,177,0.14);
      --frame:       rgba(244,143,177,0.7);
      --glow:        rgba(233,30,99,0.16);

      --fs-xs:  0.45rem;
      --fs-sm:  0.55rem;
      --fs-val: 1rem;
      --fs-ttl: 1.8rem;

      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 14px;
    }

    body.dark {
      --bg:          #0c0008;
      --card-bg:     rgba(255,255,255,0.05);
      --card-border: rgba(244,143,177,0.13);
      --card-shadow: rgba(0,0,0,0.4);
      --text:        #f8bbd0;
      --text-label:  #f48fb1;
      --text-value:  #ff80ab;
      --board-bg:    #0a0a16;
      --grid:        rgba(255,255,255,0.035);
      --frame:       rgba(244,143,177,0.45);
      --glow:        rgba(233,30,99,0.45);
    }

    /* ── Reset & base ──────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 24px 16px;
      background: var(--bg);
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      color: var(--text);
      transition: background 0.35s, color 0.35s;
    }

    /* ── Theme toggle ──────────────────────────────────────── */
    #theme-toggle {
      position: fixed; top: 18px; right: 18px; z-index: 100;
      padding: 8px 14px;
      font-family: inherit; font-size: var(--fs-xs); letter-spacing: 1px;
      color: var(--text-label);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      box-shadow: 0 2px 8px var(--card-shadow);
      cursor: pointer;
      transition: background 0.35s, color 0.35s, border-color 0.35s, box-shadow 0.35s;
    }
    #theme-toggle:hover { border-color: var(--pink-lt); }
    #theme-toggle:active { transform: scale(0.96); }

    /* ── Layout ────────────────────────────────────────────── */
    #page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #game-wrapper {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── Ad units ───────────────────────────────────────────── */
    .ad-banner {
      width: 400px;
      min-height: 90px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      overflow: hidden;
    }

    .ad-side {
      width: 160px;
      min-height: 600px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      overflow: hidden;
    }

    /* ── Board ─────────────────────────────────────────────── */
    #board-container {
      position: relative;
      border-radius: var(--r-lg);
      overflow: hidden;
      outline: 2px solid var(--frame);
      outline-offset: 3px;
      box-shadow: 0 20px 60px var(--glow);
      transition: outline-color 0.35s, box-shadow 0.35s;
    }
    #board { display: block; }

    /* ── Overlay (start & game over) ───────────────────────── */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: space-between; align-items: center;
      border-radius: 12px; overflow: hidden;
      backdrop-filter: blur(20px) saturate(1.5);
      background:
        radial-gradient(ellipse at 25% 20%, rgba(255,105,180,0.48) 0%, transparent 52%),
        radial-gradient(ellipse at 78% 80%, rgba(233,30,99,0.32) 0%, transparent 52%),
        rgba(255,210,228,0.52);
    }

    /* deco blocks */
    .deco-blocks { display: flex; flex-direction: column; gap: 3px; width: 100%; padding: 10px; }
    .deco-row    { display: flex; gap: 3px; justify-content: center; }
    .db {
      width: 34px; height: 20px; background: var(--c);
      border-radius: 2px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), inset 0 -2px 0 rgba(0,0,0,0.1);
    }

    /* overlay body */
    .overlay-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
    }

    #overlay h2 {
      font-size: var(--fs-ttl); color: #fff; letter-spacing: 6px;
      text-shadow: 3px 3px 0 rgba(180,0,80,0.38), 0 0 28px rgba(255,255,255,0.35);
    }
    .overlay-edition {
      font-size: var(--fs-xs); color: rgba(255,255,255,0.78); letter-spacing: 3px;
    }
    .overlay-hiscore {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.38);
      border-radius: var(--r-sm); padding: 12px 28px;
    }
    .ohs-label { font-size: var(--fs-xs); color: rgba(255,255,255,0.72); letter-spacing: 2px; }
    .ohs-val   { font-size: var(--fs-val); color: #fff; }

    .press-start {
      font-size: var(--fs-xs); color: #fff; letter-spacing: 2px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #overlay button {
      padding: 13px 32px; font-family: inherit;
      font-size: var(--fs-sm); letter-spacing: 2px;
      color: var(--pink); background: #fff; border: none;
      border-radius: var(--r-sm); cursor: pointer;
      box-shadow: 0 4px 0 var(--pink-lt);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #overlay button:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--pink-lt); }
    #overlay button:active { transform: translateY(2px);  box-shadow: 0 2px 0 var(--pink-lt); }

    /* ── Side panel ────────────────────────────────────────── */
    #side-panel { display: flex; flex-direction: column; gap: 8px; width: 150px; }

    .panel-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      padding: 12px 14px;
      box-shadow: 0 2px 8px var(--card-shadow);
      transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;
    }
    .panel-box h3 {
      font-size: var(--fs-xs); letter-spacing: 2px;
      color: var(--text-label); margin-bottom: 8px;
    }
    .panel-box .value {
      font-size: var(--fs-val); color: var(--text-value); line-height: 1;
    }

    #next-canvas { display: block; margin-top: 8px; }

    /* controls */
    .controls { color: var(--text-label); }
    .controls table { border-collapse: collapse; width: 100%; }
    .controls td { padding: 4px 0; vertical-align: middle; font-size: var(--fs-xs); }
    .controls td:first-child { padding-right: 8px; }

    .key {
      display: inline-block; padding: 2px 6px;
      font-family: inherit; font-size: 0.4rem;
      color: var(--pink); background: var(--card-bg);
      border: 1px solid var(--pink-lt); border-radius: 3px;
      box-shadow: 0 2px 0 var(--pink-lt); white-space: nowrap;
      transition: background 0.35s, border-color 0.35s;
    }

    /* ── Game over stats ───────────────────────────────────── */
    .go-newbest {
      font-size: var(--fs-xs); letter-spacing: 2px;
      color: #ffd600;
      text-shadow: 0 0 10px rgba(255,200,0,0.65), 1px 1px 0 rgba(140,90,0,0.4);
      animation: blink 0.7s step-end infinite;
    }
    .go-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; width: 100%; padding: 0 20px;
    }
    .go-stat {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.28);
      border-radius: var(--r-sm); padding: 10px 6px;
    }
    .go-stat-label { font-size: 0.38rem; color: rgba(255,255,255,0.68); letter-spacing: 1px; }
    .go-stat-value { font-size: 0.85rem; color: #fff; }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      padding: 12px 0 4px;
      text-align: center;
    }
    footer a {
      font-size: var(--fs-xs);
      color: var(--text-label);
      text-decoration: none;
      letter-spacing: 1px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    footer a:hover { opacity: 1; }

    /* ── Board wrapper (mobile scaling anchor) ─────────────── */
    #board-wrapper {
      width: 400px;
      height: 800px;
      flex-shrink: 0;
    }

    /* ── Mobile controls ────────────────────────────────────── */
    #mobile-controls { display: none; }

    /* ── Mobile layout ──────────────────────────────────────── */
    @media (max-width: 620px) {
      body { padding: 10px 8px; }

      #game-wrapper {
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      #side-panel {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        width: 100%;
        order: -1;
        gap: 6px;
      }
      #side-panel .panel-box { padding: 8px 6px; }
      #side-panel .panel-box.controls { display: none; }
      #side-panel .value { font-size: 0.75rem; }
      #next-canvas { width: 60px; height: 40px; margin-top: 4px; }
      .ad-side { display: none; }

      #mobile-controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }

      .mc-row {
        display: flex;
        gap: 8px;
        justify-content: center;
      }

      .mc-btn {
        flex: 1;
        max-width: 100px;
        height: 64px;
        font-family: inherit;
        font-size: 1.2rem;
        color: var(--pink);
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--r-md);
        box-shadow: 0 3px 0 var(--pink-lt);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        touch-action: manipulation;
        transition: background 0.15s;
      }
      .mc-btn:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 var(--pink-lt);
      }
      .mc-btn-label {
        display: block;
        font-size: 0.32rem;
        color: var(--text-label);
        margin-top: 4px;
        letter-spacing: 1px;
      }

      .ad-banner { width: 100%; }
    }
  </style>
</head>
<body>

  <button id="theme-toggle" onclick="toggleTheme()">🌙 DARK</button>

  <div id="page-wrapper">
  <div id="game-wrapper">
    <div id="board-wrapper">
    <div id="board-container">
      <canvas id="board" width="400" height="800"></canvas>
      <div id="overlay">
        <div class="deco-blocks">
          <div class="deco-row">
            <div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#ffc1e3"></div><div class="db" style="--c:#ffc1e3"></div><div class="db" style="--c:#ff80ab"></div>
          </div>
          <div class="deco-row">
            <div class="db" style="--c:#ffd6e7"></div><div class="db" style="--c:#ffd6e7"></div><div class="db" style="--c:#f06292"></div><div class="db" style="--c:#f06292"></div><div class="db" style="--c:#f06292"></div><div class="db" style="--c:#ffb3c6"></div><div class="db" style="--c:#ffb3c6"></div><div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#f48fb1"></div>
          </div>
        </div>
        <div class="overlay-body">
          <h2>TETRIS</h2>
          <div class="overlay-edition">✦ PINK EDITION ✦</div>
          <div class="overlay-hiscore">
            <span class="ohs-label">HI-SCORE</span>
            <span class="ohs-val" id="overlay-hi">0</span>
          </div>
          <p class="press-start">— PRESS SPACE —</p>
          <button id="start-btn">▶ START</button>
        </div>
        <div class="deco-blocks">
          <div class="deco-row">
            <div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#ffd6e7"></div><div class="db" style="--c:#ffd6e7"></div><div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#f06292"></div><div class="db" style="--c:#f06292"></div><div class="db" style="--c:#ff80ab"></div><div class="db" style="--c:#ff80ab"></div><div class="db" style="--c:#ffb3c6"></div>
          </div>
          <div class="deco-row">
            <div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#e91e63"></div><div class="db" style="--c:#ffc1e3"></div><div class="db" style="--c:#ffc1e3"></div><div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#f48fb1"></div><div class="db" style="--c:#f06292"></div><div class="db" style="--c:#ffd6e7"></div><div class="db" style="--c:#ffd6e7"></div>
          </div>
        </div>
      </div>
    </div>
    </div><!-- /board-wrapper -->

    <div id="side-panel">
      <div class="panel-box">
        <h3>BEST</h3>
        <div class="value" id="best">0</div>
      </div>
      <div class="panel-box">
        <h3>SCORE</h3>
        <div class="value" id="score">0</div>
      </div>
      <div class="panel-box">
        <h3>LEVEL</h3>
        <div class="value" id="level">1</div>
      </div>
      <div class="panel-box">
        <h3>NEXT</h3>
        <canvas id="next-canvas" width="120" height="80"></canvas>
      </div>
      <div class="panel-box controls">
        <h3>KEYS</h3>
        <table>
          <tr><td><span class="key">← →</span></td><td>이동</td></tr>
          <tr><td><span class="key">↑/Z</span></td><td>회전</td></tr>
          <tr><td><span class="key">↓</span></td><td>빠르게</td></tr>
          <tr><td><span class="key">SPC</span></td><td>즉시 낙하</td></tr>
          <tr><td><span class="key">C</span></td><td>블록 교체</td></tr>
          <tr><td><span class="key">R</span></td><td>다시 시작</td></tr>
        </table>
      </div>

      <!-- 사이드 광고 (160×600) — data-ad-slot을 본인 것으로 교체 -->
      <div class="ad-side">
        <ins class="adsbygoogle"
             style="display:block;width:160px;height:600px"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>
  </div>

  <!-- 모바일 터치 컨트롤 -->
  <div id="mobile-controls">
    <div class="mc-row">
      <button class="mc-btn" id="mc-left">◀<span class="mc-btn-label">이동</span></button>
      <button class="mc-btn" id="mc-rotate">↻<span class="mc-btn-label">회전</span></button>
      <button class="mc-btn" id="mc-right">▶<span class="mc-btn-label">이동</span></button>
    </div>
    <div class="mc-row">
      <button class="mc-btn" id="mc-soft">▼<span class="mc-btn-label">내리기</span></button>
      <button class="mc-btn" id="mc-hard">⬇<span class="mc-btn-label">즉시낙하</span></button>
      <button class="mc-btn" id="mc-swap">⇄<span class="mc-btn-label">교체</span></button>
    </div>
  </div>

  <!-- 하단 배너 광고 (728×90 leaderboard, 작은 화면엔 responsive) — data-ad-slot을 본인 것으로 교체 -->
  <div class="ad-banner">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXXX"
         data-ad-slot="YYYYYYYYYY"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <footer>
    <a href="privacy.html">개인정보처리방침</a>
  </footer>

  </div><!-- /page-wrapper -->

  <script src="tetris.js"></script>
  <script>
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('tetris_theme', isDark ? 'dark' : 'light');
      document.getElementById('theme-toggle').textContent = isDark ? '☀ LIGHT' : '🌙 DARK';
    }
    if (localStorage.getItem('tetris_theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('theme-toggle').textContent = '☀ LIGHT';
    }
  </script>
</body>
</html>
